<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>中世纪恐怖探险</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
<h1>中世纪恐怖探险</h1>

<div id="hud">
<span id="hp"></span>
<span id="mp"></span>
<span id="gold"></span>
<span id="atk"></span>
<span id="def"></span>
</div>

<div id="scene">你站在城镇入口</div>

<div id="actions">
<button onclick="goTown()">城镇</button>
<button onclick="goForest()">森林</button>
<button onclick="goLava()">熔岩洞</button>
<button onclick="openEquip()">装备</button>
<button onclick="checkEnding()">结局</button>
</div>

<div style="display:flex; gap:20px;">
  <div id="inventory">
    <h3>物品栏</h3>
    <ul id="items"></ul>
  </div>

  <div id="equipPanel" style="display:none; border:1px solid #0f0; padding:10px;">
    <h3>装备</h3>
    <div id="character">🙂</div>
    <div>武器: <span id="weaponSlot">无</span></div>
    <div>护甲: <span id="armorSlot">无</span></div>
  </div>
</div>

</div>

<script src="game_merged.js"></script>
</body>
</html>
