<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
<h1>中世纪恐怖探险</h1>
<div id="hud">
<span id="hp"></span>
<span id="mp"></span>
<span id="gold"></span>
<span id="atk"></span>
<span id="def"></span>
</div>

<div id="scene"></div>

<div>
<button onclick="goTown()">城镇</button>
<button onclick="goForest()">森林</button>
<button onclick="goLava()">熔岩</button>
<button onclick="openEquip()">装备</button>
</div>

<div id="inventory">
<h3>物品栏</h3>
<ul id="items"></ul>
</div>

<div id="equipPanel" style="display:none; border:1px solid white; padding:10px;">
<h3>装备界面</h3>
<div id="character">🙂</div>
<div>武器槽: <span id="weaponSlot">无</span></div>
<div>护甲槽: <span id="armorSlot">无</span></div>
</div>

</div>
<script src="game_v3.js"></script>
</body>
</html>
