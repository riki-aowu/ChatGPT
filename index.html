<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>中世纪恐怖探险</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">
<h1>中世纪恐怖探险</h1>

<div id="hud">
<div id="levelUI" style="position:absolute; right:20px; top:20px;">
  <div id="levelText">Lv.1</div>
  <div style="width:120px; height:10px; border:1px solid #0f0;">
    <div id="expBar" style="height:100%; width:0%; background:#0f0;"></div>
  </div>
</div>  
<span id="hp"></span>
<span id="mp"></span>
<span id="gold"></span>
<span id="atk"></span>
<span id="def"></span>
</div>

<div id="scene">你站在城镇入口</div>

<div id="forestExplorer" style="display:none;">
  <div id="forestHint">森林探索中：左侧摇杆移动，深入迷雾森林寻找 Boss。</div>
  <canvas id="forestCanvas" width="576" height="384"></canvas>
  <div id="joystickWrap">
    <div id="joystickBase">
      <div id="joystickStick"></div>
    </div>
  </div>
</div>

<div>
<button onclick="goTown()">城镇</button>
<button onclick="goForest()">森林</button>
<button onclick="goLava()">熔岩洞</button>
<button onclick="openEquip()">装备</button>
<button onclick="checkEnding()">结局</button>
</div>

<div>

  <!-- 物品栏 -->
  <div>
    <h3>物品栏</h3>
    <ul id="items"></ul>
  </div>

  <!-- 装备栏 -->
 <div id="equipPanel" style="display:none; position:absolute; right:20px; top:100px; border:1px solid #0f0; padding:10px; background:black;">
    <h3>装备</h3>
    <button onclick="closeEquip()">关闭</button>

    <div id="character">🙂</div>

    <div>武器: <span id="weaponSlot">无</span></div>
    <div>护甲: <span id="armorSlot">无</span></div>
    <div>饰品: <span id="ringSlot">无</span></div>
  </div>

</div>

</div>

<script src="game.js"></script>
</body>
</html>
